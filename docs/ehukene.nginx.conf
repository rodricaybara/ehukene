# =============================================================================
# EHUkene — Configuración NGINX
# Reverse proxy HTTPS → FastAPI (uvicorn en localhost:8000)
#
# Instalación:
#   sudo cp ehukene.conf /etc/nginx/sites-available/ehukene
#   sudo ln -s /etc/nginx/sites-available/ehukene /etc/nginx/sites-enabled/ehukene
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Certificado (Let's Encrypt):
#   sudo certbot --nginx -d ehukene.dominio.local
#
# Certificado corporativo (ruta manual):
#   Ajustar ssl_certificate y ssl_certificate_key según corresponda.
# =============================================================================


# ---------------------------------------------------------------------------
# Redireccionamiento HTTP → HTTPS
# Todo el tráfico en claro se rechaza con redirect permanente.
# ---------------------------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name ehukene.dominio.local;

    # ACME challenge para renovación de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ---------------------------------------------------------------------------
# Servidor HTTPS principal
# ---------------------------------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name ehukene.dominio.local;

    # ── Certificado SSL ───────────────────────────────────────────────────────
    # Let's Encrypt (ajustar nombre de dominio):
    ssl_certificate     /etc/letsencrypt/live/ehukene.dominio.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ehukene.dominio.local/privkey.pem;

    # Certificado corporativo (descomentar si aplica):
    # ssl_certificate     /etc/ssl/certs/ehukene.crt;
    # ssl_certificate_key /etc/ssl/private/ehukene.key;

    # ── Configuración TLS ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS — forzar HTTPS durante 1 año en clientes que ya hayan visitado el servidor
    # Descomentar solo cuando el certificado sea estable y el dominio definitivo.
    # add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Cabeceras de seguridad generales ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "no-referrer"    always;

    # ── Tamaño máximo de payload ──────────────────────────────────────────────
    # El contrato establece 1 MB como límite de payload del agente.
    # Se añade un margen mínimo para cabeceras HTTP.
    client_max_body_size 2m;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    # Los plugins del agente pueden tardar hasta 30 s (powercfg, Get-WinEvent).
    # El agente consolida y envía tras completar todos los plugins, por lo que
    # el tiempo de proceso en el backend es breve. Valores conservadores.
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;
    send_timeout            30s;

    # ── Logging ───────────────────────────────────────────────────────────────
    # Formato extendido: incluye tiempo de respuesta y X-API-Key (solo primeros
    # 8 caracteres, suficiente para identificar el dispositivo en incidencias
    # sin exponer la key completa).
    log_format ehukene_fmt '$remote_addr - $time_iso8601 '
                           '"$request" $status $body_bytes_sent '
                           'rt=$request_time '
                           'apikey="${http_x_api_key:0:8}…"';

    access_log /var/log/nginx/ehukene_access.log ehukene_fmt;
    error_log  /var/log/nginx/ehukene_error.log  warn;


    # =========================================================================
    # Proxy hacia FastAPI (Uvicorn en localhost:8000)
    # =========================================================================
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Cabeceras necesarias para que FastAPI reciba la IP real del cliente
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Deshabilitar buffering para respuestas streaming (no necesario en la
        # POC, pero evita sorpresas si se añaden endpoints de larga duración)
        proxy_buffering off;
    }


    # =========================================================================
    # Endpoint público: manifiesto de versiones (Fase 2)
    # No requiere API Key. Se mantiene bajo /api/ para coherencia de rutas,
    # pero se puede aislar aquí si se necesita rate limiting diferenciado.
    # =========================================================================
    # location /api/agent/version {
    #     proxy_pass http://127.0.0.1:8000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host            $host;
    #     proxy_set_header X-Real-IP       $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }


    # =========================================================================
    # Distribución de artefactos para auto-actualización (Fase 2)
    # Ficheros estáticos: ejecutables y plugins firmados.
    # =========================================================================
    location /dist/ {
        root      /var/www/ehukene;
        autoindex off;

        # Solo se sirven los tipos de fichero esperados
        location ~* \.(exe|py)$ {
            add_header Content-Disposition "attachment";
        }
    }


    # =========================================================================
    # Rate limiting
    # Requiere definir las zonas en nginx.conf (bloque http {}).
    #
    # Añadir en /etc/nginx/nginx.conf, dentro de http {}:
    #
    #   # Zona por IP: 10 req/s, burst de 20
    #   limit_req_zone $binary_remote_addr zone=ehukene_ip:10m rate=10r/s;
    #
    #   # Zona por API Key: 5 req/s, burst de 10
    #   # Se usa los primeros 64 bytes de la cabecera como clave de zona.
    #   limit_req_zone $http_x_api_key     zone=ehukene_key:20m rate=5r/s;
    #
    # Descomentar las líneas siguientes una vez creadas las zonas:
    # =========================================================================
    # limit_req zone=ehukene_ip  burst=20  nodelay;
    # limit_req zone=ehukene_key burst=10  nodelay;
    # limit_req_status 429;


    # =========================================================================
    # Bloqueo de rutas no definidas
    # =========================================================================
    location / {
        return 404;
    }
}
